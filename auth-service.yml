spring:
  # --- POSTGRESQL DATABASE CONFIGURATION ---
  datasource:
    url: jdbc:postgresql://localhost:5432/video_platform
    username: root
    password: root
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      # Basic connection details
      host: localhost
      port: 6379
      database: 0
      # password: your_secure_password # Uncomment if your Redis server requires authentication
      timeout: 3000ms # Connection timeout
      # Lettuce client connection pooling configurations
      lettuce:
        pool:
          max-active: 8      # Maximum number of active connections in the pool
          max-idle: 8        # Maximum number of idle connections in the pool
          min-idle: 0        # Minimum number of idle connections in the pool
          max-wait: -1ms     # Maximum time to wait for a connection to become available (-1 means wait indefinitely)
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # --- SPRING CLOUD BUS & KAFKA CONFIGURATION ---
  cloud:
    bus:
      enabled: true
      # Optional: set a specific destination/topic for the bus
      # destination: springCloudBus
    stream:
      kafka:
        binder:
          brokers: localhost:9092,localhost:9093

eureka:
  client:
    service-url:
      # The location of your Eureka Server
      defaultZone: http://localhost:8761/eureka/
    # Allow the microservice to register itself with Eureka
    register-with-eureka: true
    # Allow the microservice to fetch the list of other services
    fetch-registry: true
  instance:
    # Use IP address instead of hostname (highly recommended for Docker/Local setups)
    prefer-ip-address: true
    # Unique ID for the instance in the Eureka dashboard
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}


# --- ACTUATOR CONFIGURATION ---
management:
  endpoints:
    web:
      exposure:
        # Exposes health, info, and busrefresh (used to reload configs without restarting)
        include: "health, info, busrefresh"
  endpoint:
    health:
      show-details: always

jwt:
  secret: your_very_long_and_very_secure_secret_key_32_chars_min
  expiration: 3600000 # 1 hour
