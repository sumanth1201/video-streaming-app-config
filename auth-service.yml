spring:
  # --- POSTGRESQL DATABASE CONFIGURATION ---
  datasource:
    url: jdbc:postgresql://localhost:5432/video_platform
    username: root
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # --- SPRING CLOUD BUS & KAFKA CONFIGURATION ---
  cloud:
    bus:
      enabled: true
      # Optional: set a specific destination/topic for the bus
      # destination: springCloudBus
    stream:
      kafka:
        binder:
          brokers: localhost:9092,localhost:9093

# --- ACTUATOR CONFIGURATION ---
management:
  endpoints:
    web:
      exposure:
        # Exposes health, info, and busrefresh (used to reload configs without restarting)
        include: "health, info, busrefresh"
  endpoint:
    health:
      show-details: always
