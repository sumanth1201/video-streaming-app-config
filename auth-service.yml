spring:
  # --- POSTGRESQL DATABASE CONFIGURATION ---
  datasource:
    url: jdbc:postgresql://localhost:5432/video_platform
    username: root
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # --- SPRING CLOUD BUS & KAFKA CONFIGURATION ---
  cloud:
    bus:
      enabled: true
      # Optional: set a specific destination/topic for the bus
      # destination: springCloudBus
    stream:
      kafka:
        binder:
          brokers: localhost:9092,localhost:9093

eureka:
  client:
    service-url:
      # The location of your Eureka Server
      defaultZone: http://localhost:8761/eureka/
    # Allow the microservice to register itself with Eureka
    register-with-eureka: true
    # Allow the microservice to fetch the list of other services
    fetch-registry: true
  instance:
    # Use IP address instead of hostname (highly recommended for Docker/Local setups)
    prefer-ip-address: true
    # Unique ID for the instance in the Eureka dashboard
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}


# --- ACTUATOR CONFIGURATION ---
management:
  endpoints:
    web:
      exposure:
        # Exposes health, info, and busrefresh (used to reload configs without restarting)
        include: "health, info, busrefresh"
  endpoint:
    health:
      show-details: always
